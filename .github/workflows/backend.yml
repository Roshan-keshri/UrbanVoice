name: Backend CI/CD

on:
  push:
    branches:
      - main
    # paths:
    #   - "backend/**"
    #   - ".github/workflows/backend.yml"

  pull_request:
    branches:
      - main
    # paths:
    #   - "backend/**"

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/urbanvoice-backend:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/urbanvoice-backend:${{ github.sha }} .

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Latest Image
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/urbanvoice-backend:latest

      - name: Push Commit SHA Image
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/urbanvoice-backend:${{ github.sha }}

      - name: Trigger Render Deployment
        if: github.event_name == 'push'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"        